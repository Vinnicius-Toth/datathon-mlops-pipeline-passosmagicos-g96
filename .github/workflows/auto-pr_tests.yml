name: Tests + Auto PR

on:
  push:
    branches:
      - "feature/**"

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements-test.txt

      - name: Run tests with coverage
        run: pytest --cov=app_services --cov-report=term --cov-fail-under=80


  create-pr:
    needs: test
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request if not exists
        run: |
          echo "Checking if PR already exists..."

          if gh pr list --head "${{ github.ref_name }}" --base main --json number --jq 'length' | grep -q "1"; then
            echo "PR already exists for this branch."
          else
            echo "Creating PR..."
            gh pr create \
              --base main \
              --head "${{ github.ref_name }}" \
              --title "Feature: ${{ github.ref_name }}" \
              --body "PR criada automaticamente após aprovação dos testes (coverage ≥ 80%)."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}