name: Auto Create PR for Feature Branch

on:
  push:
    branches:
      - "feature/**"

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Create Pull Request if not exists
        run: |
          echo "Checking if PR already exists..."

          if gh pr list --head "${{ github.ref_name }}" --base main --json number --jq 'length' | grep -q "1"; then
            echo "PR already exists for this branch."
          else
            echo "Creating PR..."
            gh pr create \
              --base main \
              --head "${{ github.ref_name }}" \
              --title "Feature: ${{ github.ref_name }}" \
              --body "PR criada automaticamente para integração na main."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}